<!DOCTYPE html>
<html>
<head>
  <title>Unit Distance Graph</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    #svg {
      display: block;
      border: solid 1px #ddd;
    }
  </style>
</head>
<body>

  <div id="controls">
    <label for="deltaSlider">δ</label>
    <input type="range" id="deltaSlider" min="0" max="2" value="1" step="0.01" list="markers">
    <datalist id="markers">
      <option value="0"></option>
      <option value="1"></option>
      <option value="2"></option>
    </datalist>
    <span id="sliderValue">1.00</span>
  </div>

  <svg id="svg"></svg>

  <script>
    const WIDTH = 6;
    const HEIGHT = 4;
    const SCALE = 200;
    const POINT_RADIUS = 0.04;
    const COLORS = [
      'red',
      'green',
      'blue',
      'orange',
      'brown',
      'purple'
    ];

    const svg = document.getElementById('svg');
    svg.setAttribute('width', WIDTH * SCALE);
    svg.setAttribute('height', HEIGHT * SCALE);
    svg.setAttribute('viewBox', `0 0 ${WIDTH} ${HEIGHT}`);
    const controlsEl = document.getElementById('controls');
    controlsEl.style.width = `${WIDTH * SCALE}px`;

    const createSvgEl = (name) => {
      return document.createElementNS('http://www.w3.org/2000/svg', name);
    };

    const tpx = (x) => {
      return 0.5 * WIDTH + x;
    };

    const tpy = (y) => {
      return 0.5 * HEIGHT - y;
    };

    const tp = (p) => {
      return { x: px(x), y: px(y) };
    };

    const point = (p, colorIndex) => {
      const el = createSvgEl('circle');
      el.setAttribute('cx', tpx(p.x));
      el.setAttribute('cy', tpy(p.y));
      el.setAttribute('r', POINT_RADIUS);
      el.setAttribute('stroke', '#666');
      el.setAttribute('stroke-width', 0.005);
      el.setAttribute('fill', COLORS[colorIndex] || '#000');
      el.setAttribute('fill-opacity', 0.1);
      svg.appendChild(el);
    };

    const line = (p0, p1, colorIndex) => {
      const el = createSvgEl('line');
      el.setAttribute('x1', tpx(p0.x));
      el.setAttribute('y1', tpy(p0.y));
      el.setAttribute('x2', tpx(p1.x));
      el.setAttribute('y2', tpy(p1.y));
      el.setAttribute('stroke', COLORS[colorIndex] || '#000');
      el.setAttribute('stroke-opacity', 0.5);
      el.setAttribute('stroke-width', 0.02);
      el.setAttribute('stroke-linecap', 'round');
      svg.appendChild(el);
      point(p0, colorIndex);
      point(p1, colorIndex);
    };

    // Angles are normalized 0-1 (1 is one rotation)
    const lineP1 = (p0, length, angle) => {
      return {
        x: p0.x + length * Math.cos(angle * 2 * Math.PI),
        y: p0.y + length * Math.sin(angle * 2 * Math.PI),
      }
    };

    const dist = (p0, p1) => {
      const dx = p1.x - p0.x;
      const dy = p1.y - p0.y;
      return Math.sqrt(dx * dx + dy * dy);
    };

    const trianglePointsArray = (p0, angle) => {
      const p1 = lineP1(p0, 1, angle);
      const p2 = lineP1(p1, 1, angle + 1 / 3);
      return [ p0, p1, p2 ];
    };

    const drawTriangle = (triPoints, colorIndex) => {
      const [ p0, p1, p2 ] = triPoints;
      line(p0, p1, colorIndex);
      line(p1, p2, colorIndex);
      line(p2, p0, colorIndex);
    };

    const drawTriangleNode = (options) => {
      const { tn, parentTn, p, a, i } = options;
      const parentVertex = tn.v;
      const _p = p || parentTn._points[parentVertex];
      const parentA = a || (parentTn ? parentTn._a : 0);
      tn._a = parentA + (tn.a || 0);
      tn._points = trianglePointsArray(_p, tn._a);
      drawTriangle(tn._points, i);
      for (const childTn of tn.children || []) {
        drawTriangleNode({ tn: childTn, parentTn: tn, i });
      }
    };

    const getDistanceAngle = (angles) => {
      const p0 = { x: 0, y: 0 };
      let p = p0;
      for (const a of angles) {
        p = lineP1(p, 1, a);
      }
      return {
        d: dist(p0, p),
        a: Math.atan2(p.y, p.x) / (2 * Math.PI)
      };
    };

    const drawShape = (options) => {
      const { rootTriangleNode, d, a, count } = options;
      let aa = a;
      let p = { x: -1, y: -1.0 };
      for (let i = 0; i < count; i++) {
        drawTriangleNode({
          tn: rootTriangleNode,
          p: p,
          a: i / count,
          i: i
        });
        p = lineP1(p, d, aa)
        aa += 1 / count;
      }
    };

    // Draw the 9-18 shape
    const drawShape1 = (delta) => {
      const ad = 2 - delta;
      const rootTriangleNode = {
        children: [ { v: 1, a: (1 / 12) * ad } ]
      };
      const { d, a } = getDistanceAngle(
        [ 0, (1 / 12) * ad ]
      );
      drawShape({ rootTriangleNode, d, a, count: 3 });
    };

    // Draw the 27-81 shape
    const drawShape2 = () => {
      const rootTriangleNode = { children: [
        { v: 0, a: (2 / 24), children: [
          { v: 1, a: -(1 / 24) }
        ]},
        { v: 0, a: (1 / 24), children: [
          { v: 1, a: -(1 / 24) },
          { v: 1, a: (1 / 24) }
        ]},
        { v: 1, a: (2 / 24), children: [
          { v: 1, a: (6 / 24), children: [
            // { v: 2, a: -(7 / 24) }
          ]}
        ]},
        { v: 1, a: (1 / 24) },
      ]};
      const { d, a } = getDistanceAngle(
        [ 0, 1 / 24, 2 / 24 ]
      );
      drawShape({ rootTriangleNode, d, a, count: 3 });
    };

    const slider = document.getElementById('deltaSlider');
    const sliderValueDisplay = document.getElementById('sliderValue');

    const updateGraph = () => {
      svg.replaceChildren();
      const delta = parseFloat(slider.value);
      sliderValueDisplay.textContent = delta.toFixed(2);
      drawShape2(delta);
    };

    slider.addEventListener('input', updateGraph);

    updateGraph();
  </script>

</body>
</html>
